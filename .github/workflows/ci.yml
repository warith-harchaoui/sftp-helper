name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: System deps (ffmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests (integration skipped by marker)
        run: pytest -v

  lint:
    name: ruff
    runs-on: ubuntu-latest
    # Rule 15: PEP 8 is enforced, not suggested — a style violation blocks
    # merging exactly like a failing test. Both the linter and the formatter
    # check must exit 0 for this job (and therefore the pipeline) to pass.
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install ruff
        run: pip install ruff
      - name: Lint (ruff check)
        run: ruff check .
      - name: Format check (ruff format --check)
        run: ruff format --check .

  no-vendor-mentions:
    name: No disallowed AI-vendor mentions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history — the audit walks every commit message.
          fetch-depth: 0
      - name: Audit tracked files + history for disallowed AI-vendor names
        run: |
          # Flag Claude / Anthropic as WHOLE WORDS in tracked files or commit
          # messages — the point is to block Claude *attribution* (authorship,
          # Co-Authored-By trailers, contributor surfacing), NOT to erase the
          # legitimate product / skill-ecosystem names the docs must use.
          #
          # ALLOWED (standard product / ecosystem references, not attribution):
          #   - "Claude Desktop"  — the MCP-client product
          #   - "Claude Code"     — the CLI/agent product
          #   - "Claude Skill(s)" — the skill-ecosystem name this repo ships into
          #   - "Claude / OpenCode" / "Claude + OpenCode" / "Claude and OpenCode"
          #                       — the two skill hosts named together
          #   - "~/.claude/skills/" and ".claude/…" — skill install paths
          # `-w` gives portable word boundaries (so neutral substrings like
          # "nomoreclaude" don't count) identically on macOS and Linux. This
          # workflow file, lockfiles and vector art are excluded from the scan.
          allow='claude[ -]?desktop|claude code|claude skills?|claude ?[/+]? ?(and )?opencode|\.claude/|\.claude\b'
          files="$(git grep -inwI -e claude -e anthropic -- ':!*.lock' ':!*.svg' ':!.github/workflows/ci.yml' | grep -viE "$allow" || true)"
          hist="$(git log --all --format='%H %s%n%b' | grep -iwE 'claude|anthropic' | grep -viE "$allow" || true)"
          if [ -n "$files" ] || [ -n "$hist" ]; then
            echo "::error::disallowed AI-vendor mention found (product/skill-ecosystem names are allowed; attribution is not)"
            printf '%s\n' "$files" "$hist"
            exit 1
          fi
          echo "clean — no disallowed AI-vendor mentions"
